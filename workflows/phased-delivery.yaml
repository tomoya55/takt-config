name: phased-delivery
initial_step: plan
max_steps: 30

personas:
  planner: ../facets/personas/planner.md
  coder: ../facets/personas/coder.md
  reviewer: ../facets/personas/reviewer.md

steps:
  - name: plan
    persona: planner
    provider: claude
    model: opus
    edit: false
    rules:
      - condition: Planning is complete with numbered phases defined
        next: implement

  - name: implement
    persona: coder
    provider: cursor
    model: composer-2-fast
    edit: true
    rules:
      - condition: Current phase implementation is complete
        next: review
      - condition: Implementation cannot proceed
        next: ABORT

  - name: review
    persona: reviewer
    provider: codex
    model: codex
    edit: false
    rules:
      - condition: Code review passed with no blocking issues
        next: COMPLETE
      - condition: There are blocking issues that need fixing
        next: fix

  - name: fix
    persona: coder
    provider: cursor
    model: composer-2-fast
    edit: true
    rules:
      - condition: All review findings are fixed
        next: review
      - condition: Cannot fix the issues
        next: ABORT
